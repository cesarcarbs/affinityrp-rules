<!DOCTYPE html>
<html>
<head>
<title>AffinityRP Rules</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:30px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.rule{
background:#1e293b;
padding:25px;
margin-bottom:20px;
border-radius:10px;
}

.rule h2{
margin-top:0;
color:#38bdf8;
}

</style>
</head>

<body>

<header>AffinityRP Server Rules</header>

<div class="container">

<div class="rule">
<h2>1. No Random Deathmatch</h2>
<p>Players may not attack others without roleplay reason.</p>
</div>

<div class="rule">
<h2>2. No FailRP</h2>
<p>Act realistically and value your life.</p>
</div>

<div class="rule">
<h2>3. Respect Staff</h2>
<p>Follow instructions from server staff.</p>
</div>

<div class="rule">
<h2>4. No Exploiting</h2>
<p>Using bugs or exploits to gain advantage is prohibited.</p>
</div>

</div>

</body>
</html>
